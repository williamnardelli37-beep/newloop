<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Mensagens - TrueNAS API</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h2 { color: #007bff; }
        #chat-container {
            width: 90%;
            max-width: 500px;
            background: #1e1e1e;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #messages {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #333;
            margin-bottom: 15px;
            padding: 10px;
            background: #121212;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .msg-item {
            background: #2c2c2c;
            padding: 8px 12px;
            border-radius: 5px;
            border-left: 4px solid #007bff;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #333;
            background: #2c2c2c;
            color: white;
            outline: none;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>NAS Message Tester (API Mode)</h2>

    <div id="chat-container">
        <div id="messages">
            <div class="msg-item">A carregar mensagens do servidor...</div>
        </div>

        <div class="input-group">
            <input type="text" id="msgInput" placeholder="Digite sua mensagem...">
            <button id="sendBtn">Enviar</button>
        </div>
    </div>

    <script>
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesDiv = document.getElementById('messages');

        // 1. Função para renderizar na tela
        function renderMsg(texto) {
            const div = document.createElement('div');
            div.className = 'msg-item';
            div.textContent = texto;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 2. Função para buscar mensagens da API
        async function carregarMensagens() {
            try {
                const response = await fetch('/api/mensagens');
                if (!response.ok) throw new Error("Erro na API");
                
                const msgs = await response.json();
                
                messagesDiv.innerHTML = ''; // LIMPA A TELA

                if (msgs.length === 0) {
                    messagesDiv.innerHTML = '<div class="msg-item">Nenhuma mensagem. Escreve algo!</div>';
                } else {
                    msgs.forEach(msg => renderMsg(`${msg.usuario}: ${msg.texto}`));
                }
            } catch (erro) {
                console.error("Erro:", erro);
                messagesDiv.innerHTML = '<div class="msg-item" style="border-left-color: red;">Erro: Servidor Offline</div>';
            }
        }

        // 3. Função para enviar mensagem
        async function enviarParaAPI() {
            const texto = msgInput.value;
            if (!texto) return;

            try {
                const response = await fetch('/api/mensagens', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto: texto, usuario: "MacBook-User" })
                });

                if (response.ok) {
                    msgInput.value = '';
                    await carregarMensagens(); 
                }
            } catch (erro) {
                alert("Erro ao conectar com o servidor.");
            }
        }

        sendBtn.addEventListener('click', enviarParaAPI);

        // Inicia o sistema
        carregarMensagens();
        // Atualiza a cada 3 segundos
        setInterval(carregarMensagens, 3000);
    </script>
</body>
</html>
