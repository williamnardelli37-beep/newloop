<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manutenção Temporária</title>
<link rel="shortcut icon" href="loop web.png" type="image/x-icon">

<style>
:root {
    --apple-text: #1d1d1f;
    --apple-gray: #6e6e73;
    --apple-bg: #f5f5f7;
    --accent-blue: #0071e3;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--apple-bg);
}

/* CONTAINER */
.wrapper {
    max-width: 1100px;
    margin: auto;
    padding: 30px 20px;
}

/* GRID */
.layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    align-items: center;
}

/* BOX */
.maintenance-box {
    background: #fff;
    padding: 40px 25px;
    border-radius: 24px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.05);
}

/* PROPAGANDA */
.ad-box {
    background: #fff;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.05);
}

/* IMAGEM */
.ad-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* TEXTO */
h1 {
    font-size: clamp(28px, 5vw, 44px);
    margin-bottom: 10px;
}

p {
    color: var(--apple-gray);
    font-size: 16px;
}

/* TIMER */
.timer {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 25px;
}

.time-box {
    background: var(--apple-bg);
    padding: 15px;
    border-radius: 14px;
    min-width: 75px;
}

.time {
    font-size: 26px;
    font-weight: bold;
}

.label {
    font-size: 12px;
    color: var(--apple-gray);
}

/* LOADER */
.loader {
    margin-top: 25px;
    width: 38px;
    height: 38px;
    border: 4px solid #ddd;
    border-top: 4px solid var(--accent-blue);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-left: auto;
    margin-right: auto;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* =========================
   MOBILE OTIMIZADO
========================= */
@media (max-width: 900px) {

    .layout {
        grid-template-columns: 1fr;
        gap: 20px;
    }

    .maintenance-box {
        padding: 30px 20px;
    }

    /* imagem com proporção bonita */
    .ad-box {
        height: 260px;
    }

    /* timer maior no celular */
    .time {
        font-size: 28px;
    }

    .time-box {
        min-width: 80px;
        padding: 16px;
    }
}

/* TELAS PEQUENAS */
@media (max-width: 480px) {

    h1 {
        font-size: 26px;
    }

    p {
        font-size: 14px;
    }

    .timer {
        gap: 10px;
    }

    .time-box {
        min-width: 65px;
        padding: 12px;
    }

    .time {
        font-size: 22px;
    }

    .ad-box {
        height: 220px;
    }
}
</style>
</head>

<body>

<div class="wrapper">
    <div class="layout">

        <!-- MANUTENÇÃO -->
        <div class="maintenance-box">
            <h1>Estamos em manutenção temporária</h1>
            <p>
                Correção de bugs e melhorias de segurança.<br>
                Retorno estimado:
            </p>

            <div class="timer">
                <div class="time-box">
                    <div class="time" id="hours">00</div>
                    <div class="label">Horas</div>
                </div>
                <div class="time-box">
                    <div class="time" id="minutes">00</div>
                    <div class="label">Min</div>
                </div>
                <div class="time-box">
                    <div class="time" id="seconds">00</div>
                    <div class="label">Seg</div>
                </div>
            </div>

            <div class="loader"></div>
        </div>

        <!-- PROPAGANDA -->
        <div class="ad-box">

            <!-- 🔥 COLOQUE SUA IMAGEM AQUI -->
            <img src="Gemini_Generated_Image_gfzno5gfzno5gfzn 2.jpg" alt="iConnect">

        </div>

    </div>
</div>

<script>
const duration = 4 * 60 * 60 * 1000;
const STORAGE_KEY = "maintenance_end_time";

let endTime = localStorage.getItem(STORAGE_KEY);

if (!endTime) {
    endTime = Date.now() + duration;
    localStorage.setItem(STORAGE_KEY, endTime);
} else {
    endTime = parseInt(endTime);
}

function updateTimer() {
    const now = Date.now();
    let remaining = endTime - now;

    if (remaining <= 0) {
        remaining = 0;
        clearInterval(timerInterval);
        document.querySelector("p").innerHTML =
            "Sistema atualizado. Atualize a página.";
        localStorage.removeItem(STORAGE_KEY);
    }

    const hours = Math.floor(remaining / (1000 * 60 * 60));
    const minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((remaining % (1000 * 60)) / 1000);

    document.getElementById("hours").innerText = String(hours).padStart(2, '0');
    document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
    document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');
}

const timerInterval = setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
